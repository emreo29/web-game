<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen Hauptmenü</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-layer"></div>

    <main class="menu-container">
        <h1 class="game-title">PROJECT<br><span>SONIC</span></h1>
        
        <div id="mainMenu">
            <nav class="main-nav">
                <button class="nav-btn" id="btnNewGame" data-target="new-game">Neues Spiel</button>
                <button class="nav-btn" data-target="load-game">Spiel laden</button>
                <button class="nav-btn" id="btnOptions">Optionen</button>
                <button class="nav-btn" data-target="extras">Extras</button>
                <button class="nav-btn quit-btn" data-target="quit">Beenden</button>
            </nav>
        </div>

        <div id="optionsMenu" class="hidden">
            <nav class="main-nav">
                <h2 style="color: rgba(255,255,255,0.5); margin-bottom: 10px; font-weight: 300; letter-spacing: 2px;">OPTIONEN</h2>
                <button class="nav-btn">Profil & Account</button>
                <button class="nav-btn">Grafik & Video</button>
                <button class="nav-btn">Audio</button>
                <button class="nav-btn quit-btn" id="btnBack">Zurück</button>
            </nav>
        </div>

        <div id="charSelectMenu" class="hidden">
            <audio id="bgm" loop>
                <source src="audio/Character Select (PlayStation2 Version).mp3" type="audio/mpeg">
            </audio>

            <div class="char-select-layout">
                <div class="roster-grid">
                    <button class="nav-btn char-slot" data-char="TIFA LOCKHART" data-img="img/tifa_render.png">
                        <img src="img/tifa_icon.png" alt="Tifa">
                    </button>
                    <button class="nav-btn char-slot" data-char="SONIC THE HEDGEHOG" data-img="img/sonic_render.png">
                        <img src="img/sonic_icon.png" alt="Sonic">
                    </button>
                    <button class="nav-btn char-slot" data-char="SHADOW THE HEDGEHOG" data-img="img/shadow_render.png">
                        <img src="img/shadow_icon.png" alt="Shadow">
                    </button>
                </div>

                <div class="main-display">
                    <img id="main-render" src="img/tifa_render.png" alt="Tifa">
                    <h2 id="char-name" class="game-title" style="font-size: 2.5rem; margin-top: 20px;"><span>WÄHLE</span> KÄMPFER</h2>
                </div>
            </div>
            
            <button class="nav-btn quit-btn" id="btnBackFromChar" style="margin-top: 40px;">Zurück zum Hauptmenü</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
